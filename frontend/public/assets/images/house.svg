<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="houseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roofGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#houseGradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- House roof -->
  <polygon points="100,40 160,85 40,85" fill="url(#roofGradient)" />
  
  <!-- House body -->
  <rect x="50" y="85" width="100" height="70" fill="url(#houseGradient)" rx="5"/>
  
  <!-- Door -->
  <rect x="85" y="120" width="30" height="40" fill="#f5576c" rx="3"/>
  
  <!-- Door handle -->
  <circle cx="112" cy="140" r="2" fill="#ffd700"/>
  
  <!-- Door top window -->
  <rect x="92" y="125" width="16" height="8" fill="#87ceeb" rx="1" opacity="0.8"/>
  
  <!-- Left window -->
  <rect x="60" y="95" width="18" height="18" fill="#87ceeb" rx="2" opacity="0.9"/>
  <line x1="69" y1="95" x2="69" y2="113" stroke="#667eea" stroke-width="1"/>
  <line x1="60" y1="104" x2="78" y2="104" stroke="#667eea" stroke-width="1"/>
  
  <!-- Right window -->
  <rect x="122" y="95" width="18" height="18" fill="#87ceeb" rx="2" opacity="0.9"/>
  <line x1="131" y1="95" x2="131" y2="113" stroke="#667eea" stroke-width="1"/>
  <line x1="122" y1="104" x2="140" y2="104" stroke="#667eea" stroke-width="1"/>
  
  <!-- Chimney -->
  <rect x="145" y="60" width="8" height="35" fill="#e74c3c" rx="1"/>
  <rect x="143" y="55" width="12" height="8" fill="#c0392b" rx="1"/>
  
  <!-- Smoke -->
  <circle cx="149" cy="50" r="3" fill="#95a5a6" opacity="0.6"/>
  <circle cx="152" cy="45" r="2.5" fill="#95a5a6" opacity="0.4"/>
  
  <!-- Foundation lines -->
  <line x1="50" y1="155" x2="150" y2="155" stroke="#667eea" stroke-width="1.5" opacity="0.5"/>
  <line x1="48" y1="155" x2="152" y2="155" stroke="#f5576c" stroke-width="2" opacity="0.3"/>
  
  <!-- Decorative corner accents -->
  <circle cx="52" cy="87" r="3" fill="#f093fb" opacity="0.6"/>
  <circle cx="148" cy="87" r="3" fill="#f093fb" opacity="0.6"/>
</svg>